sink {
  host = "127.0.0.1"
  port = 8080
  graph_name = "hugegraph"
  graph_space = "default_space"
  username = "admin"
  password = "password"
  batch_size = 1024
  batch_interval_ms = 1000
  schema_config = {
      type = "VERTEX"
      label = "person"
      tablePath = "db1.person"
      idStrategy = "PRIMARY_KEY"
      idFields = ["id"]
      mapping = {
        propertyMapping = {
          name = "person_name"
          age = "person_age"
        }
      }
   }
}