env {
  parallelism = 1
  job.mode = "BATCH"
  # You can set spark configuration here
  spark.app.name = "SeaTunnel"
  spark.executor.instances = 2
  spark.executor.cores = 1
  spark.executor.memory = "1g"
  spark.master = local
  job.mode = "BATCH"
}

source {
  LocalFile {
    path = "/seatunnel/read/special_excel"
    plugin_output = "fake"
    file_format_type = excel
    sheet_name=Sheet1
    field_delimiter = ;
    skip_header_row_number = 0
    schema = {
      fields {
        A =  string
        B =  string
        C =  string
        D =  string
        E =  string
        F =  string
        G =  string
        H =  string
      }
    }
  }
}

sink {
  Assert {
    rules {
      row_rules = [
        {
          rule_type = MAX_ROW
          rule_value = 11
        },
        {
          rule_type = MIN_ROW
          rule_value = 11
        }
      ]
    }
  }
}
