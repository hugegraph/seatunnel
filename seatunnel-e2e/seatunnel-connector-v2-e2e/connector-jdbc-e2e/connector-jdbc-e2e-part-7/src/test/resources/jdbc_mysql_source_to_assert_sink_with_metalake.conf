env {
  execution.parallelism = 1
  job.mode = "BATCH"
}

source {
  Jdbc {
      url = "jdbc:mysql://mysql-e2e:3306/seatunnel?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      driver = "com.mysql.cj.jdbc.Driver"
      connection_check_timeout_sec = 100
      sourceId = "test_catalog"
      user = "${jdbc-user}"
      password = "${jdbc-password}"
      query = "select * from source"
  }
}

transform {
}

sink {
  Assert {
      rules =
        {
          row_rules = [
            {
              rule_type = MAX_ROW
              rule_value = 101
            },
            {
              rule_type = MIN_ROW
              rule_value = 99
            }
          ],
          field_rules = [
          {
            field_name = c_bit_8
            field_type = bytes
            field_value = [
              {
                  rule_type = NOT_NULL
              }
            ]
          },
          {
            field_name = c_bit_16
            field_type = bytes
            field_value = [
              {
                  rule_type = NOT_NULL
              }
            ]
          },
          {
            field_name = c_bit_32
            field_type = bytes
            field_value = [
              {
                  rule_type = NOT_NULL
              }
            ]
          },
          {
            field_name = c_bit_64
            field_type = bytes
            field_value = [
              {
                  rule_type = NOT_NULL
              }
            ]
          },
          {
            field_name = c_bigint_30
            field_type = "decimal(20,0)"
            field_value = [
              {
                rule_type = NOT_NULL
              }
            ]
          },
          ]
        }
    }
}