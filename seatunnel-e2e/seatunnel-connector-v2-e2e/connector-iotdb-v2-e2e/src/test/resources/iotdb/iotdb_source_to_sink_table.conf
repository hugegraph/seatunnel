######
###### This config file is a demonstration of streaming processing in seatunnel config
######

env {
  parallelism = 2
  job.mode = "BATCH"
}

source {
  IoTDBv2 {
    node_urls = ["flink_e2e_iotdb_sink:6667"]
    username = "root"
    password = "root"
    sql_dialect = "table"
    sql = "SELECT time, c_tag, c_attribute, c_boolean, c_tinyint, c_smallint, c_int, c_bigint, c_float, c_double, c_string, c_text, c_date, c_timestamp, c_blob FROM testSourceDatabase.testTable"
    schema {
      fields {
        time = timestamp
        c_tag = string
        c_attribute = string
        c_boolean = boolean
        c_tinyint = tinyint
        c_smallint = smallint
        c_int = int
        c_bigint = bigint
        c_float = float
        c_double = double
        c_string = string
        c_text = string
        c_date = date
        c_timestamp = bigint
        c_blob = string
      }
    }
  }
}

sink {
  IoTDBv2 {
    node_urls = ["flink_e2e_iotdb_sink:6667"]
    username = "root"
    password = "root"
    sql_dialect = "table"
    storage_group = "testSinkDatabase"
    key_device = "c_string"
    key_timestamp = "time"
    key_tag_fields = ["c_tag"]
    key_attribute_fields = ["c_attribute"]
  }
}