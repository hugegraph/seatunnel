env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Paimon {
    warehouse = "/tmp/seatunnel_mnt/paimon"
    table_list = [
      {
        database = "default"
        table = "st_test"
      },
      {
        database = "default"
        table = "st_test_p"
      }
    ]
    plugin_output = paimon_source
  }
}

sink {
  Assert {
    plugin_input = paimon_source
    rules {
      table-names = ["default.st_test", "default.st_test_p"],
      tables_configs = [
          {
            table_path = "default.st_test"
            row_rules = [
              {
                rule_type = MAX_ROW
                rule_value = 100000
              },
              {
                rule_type = MIN_ROW
                rule_value = 100000
              }
            ]
          },
          {
            table_path = "default.st_test_p"
            row_rules = [
              {
                rule_type = MAX_ROW
                rule_value = 100
              },
              {
                rule_type = MIN_ROW
                rule_value = 100
              }
            ]
          }
      ]
    }
  }
}


