env {
  parallelism = 1
  job.mode = "STREAMING"
  checkpoint.interval = 10000
}

source {
  # This is a example source plugin **only for test and demonstrate the feature source plugin**
  FakeSource {
      plugin_output = "fake1"
      row.num = 150
      split.num = 5
      split.read-interval = 3000
      schema = {
        table = "fake.table1"
        fields {
          id = bigint
          name = string
          score = int
        }
      }
    }

    FakeSource {
        plugin_output = "fake2"
        row.num = 90
        split.num = 5
        split.read-interval = 3000
        schema = {
          table = "fake.public.table2"
          fields {
            id = bigint
            name = string
            score = int
          }
        }
      }

}

transform {
}

sink {
  console {
    plugin_input = "fake1"
  }
  console {
    plugin_input = "fake2"
  }
}
