env {
  job.mode = "BATCH"
}

source {
  FakeSource {
    plugin_output = "fake"
    tables_configs = [
      {
        row.num = 20
        schema = {
          table = "test.user_logs"
          fields {
            id = "int"
            access_info = "string"
          }
        }
        rows = [
          {
            kind = INSERT,
            fields = [1, "2023-12-01 10:30:45 user:dev@example.com login"]
          },
          {
            kind = INSERT,
            fields = [2, "2023-12-01 11:15:22 user:dev@test.org error"]
          }
        ]
      },
      {
        row.num = 30
        schema = {
          table = "test.access_logs"
          fields {
            id = "int"
            access_info = "string"
          }
        }
        rows = [
          {
            kind = INSERT,
            fields = [1, "2023-12-01 11:15:22 user:guest@domain.net"]
          },
          {
            kind = INSERT,
            fields = [2, "2023-12-01 11:15:22 user:dev@company.com"]
          }
        ]
      }
    ]
  }
}

transform {
  RegexExtract {
    plugin_input = "fake"
    plugin_output = "regex_result"
    source_field = "access_info"
    regex_pattern = "(\\d{4}-\\d{2}-\\d{2})\\s+(\\d{2}:\\d{2}:\\d{2})\\s+([^@]+@[^\\s]+)"
    output_fields = ["date", "time", "email"]
  }
}

sink {
  Assert {
    plugin_input = "regex_result"
    rules = {
      tables_configs = [
        {
          table_path = "test.user_logs"
          field_rules = [
            {
              field_name = date
              field_type = string
              field_value = [
                {
                  rule_type = NOT_NULL
                }
              ]
            },
            {
              field_name = time
              field_type = string
              field_value = [
                {
                  rule_type = NOT_NULL
                }
              ]
            },
            {
              field_name = email
              field_type = string
              field_value = [
                {
                  rule_type = NOT_NULL
                }
              ]
            }
          ]
        },
        {
          table_path = "test.access_logs"
          field_rules = [
            {
              field_name = date
              field_type = string
              field_value = [
                {
                  rule_type = NOT_NULL
                }
              ]
            },
            {
              field_name = time
              field_type = string
              field_value = [
                {
                  rule_type = NOT_NULL
                }
              ]
            },
            {
              field_name = email
              field_type = string
              field_value = [
                {
                  rule_type = NOT_NULL
                }
              ]
            }
          ]
        }
      ]
    }
  }
}