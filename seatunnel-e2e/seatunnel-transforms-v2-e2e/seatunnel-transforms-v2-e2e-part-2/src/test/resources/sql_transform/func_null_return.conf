######
###### This config file is a demonstration of streaming processing in seatunnel config
######

env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  FakeSource {
    plugin_output = "fake"
    schema = {
      fields {
        id = "int"
        name = "string"
        nullable_field = "string"
        nested_data = {
          fields = {
            inner_field = "string"
            inner_nullable = "string"
          }
        }
      }
    }
    rows = [
      {fields = [1, "Test Name", null, {inner_field: "inner_value", inner_nullable: null}], kind = INSERT},
      {fields = [2, "Another Name", "Some Value", {inner_field: "another_inner", inner_nullable: "non_null"}], kind = INSERT},
      {fields = [3, "Third Name", null, {inner_field: null, inner_nullable: null}], kind = INSERT}
    ]
  }
}

transform {
  sql {
    plugin_input = "fake"
    plugin_output = "fake1"
    query = "select id, name, nullable_field, nested_data.inner_field, nested_data.inner_nullable, nested_data.inner_field as copied_field from fake"
  }
}

sink {
  Assert {
    plugin_input = "fake1"
    rules = {
      field_rules = [
        {
          field_name = "id"
          field_type = "int"
          field_value = [
            {equals_to = 1},
            {equals_to = 2},
            {equals_to = 3}
          ]
        },
        {
          field_name = "name"
          field_type = "string"
          field_value = [
            {equals_to = "Test Name"},
            {equals_to = "Another Name"},
            {equals_to = "Third Name"}
          ]
        },
        {
          field_name = "nullable_field"
          field_type = "string"
          field_value = [
            {is_null = true},
            {equals_to = "Some Value"},
            {is_null = true}
          ]
        },
        {
          field_name = "inner_field"
          field_type = "string"
          field_value = [
            {equals_to = "inner_value"},
            {equals_to = "another_inner"},
            {is_null = true}
          ]
        },
        {
          field_name = "inner_nullable"
          field_type = "string"
          field_value = [
            {is_null = true},
            {equals_to = "non_null"},
            {is_null = true}
          ]
        },
        {
          field_name = "copied_field"
          field_type = "string"
          field_value = [
            {equals_to = "inner_value"},
            {equals_to = "another_inner"},
            {is_null = true}
          ]
        }
      ]
    }
  }
}